font:
  size: 16
draw_bold_text_with_bright_colors: false
custom_cursor_colors: true
window:
  opacity: 1
cursor:
  style:
    shape: Block
colors:
  primary:
    background: '0x101421'
    foreground: '0xfffbf6'

  normal:
    black:   '0x2e2e2e'
    red:     '0xeb4129'
    green:   '0xabe047'
    yellow:  '0xf6c744'
    blue:    '0x47a0f3'
    magenta: '0x7b5cb0'
    cyan:    '0x64dbed'
    white:   '0xe5e9f0'

  bright:
    black:   '0x565656'
    red:     '0xec5357'
    green:   '0xc0e17d'
    yellow:  '0xf9da6a'
    blue:    '0x49a4f8'
    magenta: '0xa47de9'
    cyan:    '0x99faf2'
    white:   '0xffffff'
key_bindings:
  - { key: Comma, mods: Command, chars: "\x02\x2c" }
  - { key: Period, mods: Command, chars: "\x02\x2e" }
  - { key: J, mods: Command, chars: "\x02\x6a" }
  - { key: K, mods: Command, chars: "\x02\x6b" }
  - { key: T, mods: Command, chars: "\x02\x6e" }
  - { key: W, mods: Command, chars: "\x02\x63" }
  - { key: Return, mods: Command, chars: "\x02\x6f" }
  - { key: F, mods: Command, chars: "\x02\x66" }
  - { key: Y, mods: Command, chars: "\x02\x79" }
