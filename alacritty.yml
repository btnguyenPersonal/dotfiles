font:
  size: 16
draw_bold_text_with_bright_colors: false
custom_cursor_colors: true
window:
  opacity: 1
cursor:
  style:
    shape: Block
colors:
  primary:
    background: '0xf8f8f8'
    foreground: '0x2a2b33'

  normal:
    black:   '0x000000'
    red:     '0xde3d35'
    green:   '0x3e953a'
    yellow:  '0xd2b67b'
    blue:    '0x2f5af3'
    magenta: '0xa00095'
    cyan:    '0x3e953a'
    white:   '0xbbbbbb'

  bright:
    black:   '0x000000'
    red:     '0xde3d35'
    green:   '0x3e953a'
    yellow:  '0xd2b67b'
    blue:    '0x2f5af3'
    magenta: '0xa00095'
    cyan:    '0x3e953a'
    white:   '0xffffff'

  key_bindings:
    - { key: Comma, mods: Command, chars: "\x02\x2c" }
    - { key: Period, mods: Command, chars: "\x02\x2e" }
    - { key: J, mods: Command, chars: "\x02\x6a" }
    - { key: K, mods: Command, chars: "\x02\x6b" }
    - { key: T, mods: Command, chars: "\x02\x6e" }
    - { key: N, mods: Command, chars: "\x02\x6e" }
    - { key: W, mods: Command, chars: "\x02\x63" }
    - { key: Return, mods: Command, chars: "\x02\x6f" }
    - { key: F, mods: Command, chars: "\x02\x66" }
    - { key: Y, mods: Command, chars: "\x02\x79" }
