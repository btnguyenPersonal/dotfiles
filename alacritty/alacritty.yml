font:
  size: 8.0
draw_bold_text_with_bright_colors: false
custom_cursor_colors: true
background_opacity: 1
window:
  dimensions:
    columns: 97
    lines: 51
  decorations: None

 #Colors
#colors:
   ## Default colors
   #primary:
     #background: '0x1d1f21'
     #background: '0x000000'
     #foreground: '0xffffff'
    #Colors the cursor will use if `custom_cursor_colors` is true
   #cursor:
     #text: '0x1d1f21'
     #cursor: '0xc5c8c6'
    #Normal colors
   #normal:
     #black:   '0x000000'
     #red:     '0xcc6666'
     #green:   '0x0a734b'
     #yellow:  '0xf0c674'
     #blue:    '0x81a2be'
     #magenta: '0xb294bb'
     #cyan:    '0x8abeb7'
     #white:   '0xffffff'
    #Bright colors
   #bright:
     #black:   '0x969896'
     #red:     '0xde935f'
     #green:   '0x282a2e'
     #yellow:  '0x373b41'
     #blue:    '0xb4b7b4'
     #magenta: '0xe0e0e0'
     #cyan:    '0xa3685a'
     #white:   '0xffffff'
# Colors (Hyper)
colors:
  # Default colors
  primary:
    background: '0x000000'
    foreground: '0xffffff'
  cursor:
    text: '0xF81CE5'
    cursor: '0xffffff'

  # Normal colors
  normal:
    black:   '0x000000'
    red:     '0xfe0100'
    green:   '0x33ff00'
    yellow:  '0xfeff00'
    blue:    '0x0066ff'
    magenta: '0xcc00ff'
    cyan:    '0x00ffff'
    white:   '0xd0d0d0'

  # Bright colors
  bright:
    black:   '0x808080'
    red:     '0xfe0100'
    green:   '0x33ff00'
    yellow:  '0xfeff00'
    blue:    '0x0066ff'
    magenta: '0xcc00ff'
    cyan:    '0x00ffff'
    white:   '0xFFFFFF'
