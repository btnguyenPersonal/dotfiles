unbind C-b
set -s escape-time 1
set -g prefix C-a
bind C-a send-prefix
set -g status off
bind j 'select-pane -t :.+'
bind k 'select-pane -t :.-'
bind > 'rotate-window -D; select-pane -t 1;select-layout main-horizontal;resize-pane -t :.0 -y 75%'
bind < 'rotate-window -U; select-pane -t 0;select-layout main-horizontal;resize-pane -t :.0 -y 75%'
bind c 'kill-pane;select-layout main-horizontal;resize-pane -t :.0 -y 75%'
bind w 'split-window -t :.0; swap-pane -s :.0 -t :.1;select-layout main-horizontal;resize-pane -t :.0 -y 75%'
bind n 'split-window -t :.5 -c "#{pane_current_path}"; swap-pane -s :.0 -t :.1;select-layout main-horizontal;resize-pane -t :.0 -y 75%'
bind Enter 'swap-pane -s :. -t :.0; select-pane -t :.0'
bind f 'resize-pane -Z'
bind r source-file ~/.tmux.conf \; display "Reloaded ~/.tmux.conf"
bind y 'copy-mode'
bind -T copy-mode-vi v send -X 'begin-selection'
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -i"
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -i"
